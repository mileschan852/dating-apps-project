# Manual npm publish — only runs when explicitly triggered with NPM_TOKEN set
name: Publish Packages to npm

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm npm publish'
        required: true

jobs:
  publish:
    if: ${{ github.event.inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm turbo run build --filter=@dating/*

      - name: Publish to npm
        run: pnpm publish -r --filter=@dating/core --filter=@dating/ui --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
