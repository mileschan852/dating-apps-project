# Release workflow is disabled — packages are internal workspace-only packages
# and are not published to npm. Enable this only when you have an NPM_TOKEN
# secret configured and want to publish @dating/core and @dating/ui publicly.
name: Release (disabled)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm npm publish'
        required: true

jobs:
  release:
    if: ${{ github.event.inputs.confirm == 'publish' }}
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
